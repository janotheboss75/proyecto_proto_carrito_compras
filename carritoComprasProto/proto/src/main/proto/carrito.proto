syntax = "proto3";

option java_package = "valdez.alejandro.carrito.grpc";
option java_multiple_files = true;

//GESTION DE INVENTARIO
service InventarioService{
    rpc cargarInventario(InventarioRequest) returns (InventarioResponse);
}
message Producto {
    string id = 1;
    string nombre = 2;
    double precio = 3;
}
message StockProducto {
    Producto producto = 1;
    int32 stock = 2;
}
message InventarioRequest {
    string usuario_id = 1;
}
message InventarioResponse {
    repeated StockProducto items = 1;
}

//GESTION DE PRODUCTOS
service ProductoService{
    rpc listarProductos(ProductoRequest) returns (ProductoResponse);
    rpc escucharNuevosProductos(ProductoRequest) returns (stream ProductoResponse);
}
message ProductoRequest {
    string usuario_id = 1;
}
message ProductoResponse {
    repeated Producto productos = 1;
}

//GESTION DE COMPRAS
enum EstadoCompra {
    APROBADO = 0;
    SIN_STOCK = 1;
    ERROR = 2;
}

service CompraService{
    rpc procesarCompra(CompraRequest) returns (CompraResponse);
}
message ProductoCarrito {
    string producto_id = 1;
    int32 cantidad = 2;
}
message CompraRequest {
    string usuario_id = 1;
    repeated ProductoCarrito items = 2;
}
message CompraResponse {
    string transaccion_id = 1;
    double subtotal = 2;
    double impuestos = 3;
    double total_pagar = 4;
    EstadoCompra estado = 5;
}
